<div id="player-bar">
  <div class="player-row1">
    <div class="player-ctrls">
      <button id="player-prev" class="player-btn player-btn-prev" data-icon="⏮" aria-label="Previous track"></button>
      <button id="player-play" class="player-btn" data-icon="▶" aria-label="Play/Pause"></button>
      <button id="player-next" class="player-btn player-btn-next" data-icon="⏭" aria-label="Next track"></button>
    </div>
    <div class="player-track">
      <div id="player-label" class="player-label"></div>
      <div class="player-scrub-container">
        <canvas id="player-waveform" class="player-waveform"></canvas>
        <div id="player-scrubber" class="player-scrubber" style="display:none">
          <div id="player-scrub-fill" class="player-scrub-fill"></div>
        </div>
      </div>
    </div>
    <div class="player-time-wrap">
      <span id="player-time" class="player-time"></span>
    </div>
  </div>
  <div class="player-row2">
    <span class="player-up-next">UP NEXT</span>
    <div id="player-pills" class="player-pills"></div>
    <button id="player-clear" class="player-clear">✕ clear</button>
  </div>
</div>
